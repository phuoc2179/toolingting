<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Portal Documents Report Viewer</title>
<style>
  :root {
    --ink:#15212b; --ink-soft:#5a6b78; --line:#dfe5ea; --bg:#f5f7f9; --panel:#ffffff;
    --accent:#1f6feb; --ok:#127a3e; --ok-bg:#e7f4ec; --bad:#b42318; --bad-bg:#fdeceb;
    --warn:#9a6700; --warn-bg:#fdf3e2; --absent:#9aa7b1;
    --mono:"SF Mono",ui-monospace,"Cascadia Code",Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --radius:10px;
  }
  *, *::before, *::after { box-sizing: border-box }
  [hidden] { display:none !important }
  body { margin:0; background:var(--bg); color:var(--ink); font-family:var(--sans); font-size:14px; line-height:1.5 }
  .wrap { max-width:1200px; margin:0 auto; padding:28px 22px 80px }
  header h1 { font-size:20px; margin:0 0 2px; letter-spacing:-.01em }
  header p  { margin:0 0 20px; color:var(--ink-soft) }
  .nav { margin:0 0 18px; font-size:13px }
  .nav a { color:var(--accent); text-decoration:none; font-weight:600 }
  .nav a:hover { text-decoration:underline }
  .panel { background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); padding:18px }
  .drop {
    display:block; border:1.5px dashed var(--line); border-radius:8px; padding:18px 16px; text-align:center;
    cursor:pointer; transition:border-color .15s, background .15s; background:#fff;
  }
  .warn-banner { background:var(--warn-bg); border:1px solid #f0d9a8; color:var(--warn); border-radius:8px; padding:10px 14px; margin:14px 0 0; font-size:12px; line-height:1.6 }
  .drop:hover, .drop.drag { border-color:var(--accent); background:#f7faff }
  .drop.loaded { border-style:solid; border-color:var(--ok); background:var(--ok-bg) }
  .drop .dz-title { font-weight:600; font-size:13px }
  .drop .dz-sub { font-size:11px; color:var(--ink-soft); margin-top:3px; word-break:break-all }
  .drop input[type=file] { display:none }
  .muted { color:var(--ink-soft); font-size:12px }
  .status { margin:14px 0 0; color:var(--ink-soft); font-size:13px; min-height:18px }
  .status.err { color:var(--bad) }

  .section-title { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--ink-soft); margin:26px 0 10px }
  .summary { display:flex; gap:10px; flex-wrap:wrap; margin:10px 0 }
  .chip { background:#fff; border:1px solid var(--line); border-radius:8px; padding:9px 14px; min-width:84px }
  .chip b { display:block; font-size:22px; line-height:1.1 }
  .chip span { font-size:11px; color:var(--ink-soft) }
  .chip-filter { background:#fbfcfd; cursor:pointer; transition:border-color .12s, background .12s }
  .chip-filter:hover { border-color:var(--accent) }
  .chip-filter.active { border-color:var(--accent); background:#eaf2ff }
  .chip-filter b { font-size:17px }

  .toolbar { display:flex; gap:12px; align-items:center; margin:0 0 10px; flex-wrap:wrap }
  input[type=text], select {
    padding:8px 10px; border:1px solid var(--line); border-radius:7px;
    font-size:12px; background:#fff; color:var(--ink);
  }
  input[type=text] { width:260px; font-family:var(--mono) }
  input[type=text]:focus, select:focus { outline:2px solid var(--accent); outline-offset:-1px; border-color:var(--accent) }
  select { font-family:var(--sans) }

  .doc-table { width:100%; border-collapse:collapse; font-size:12px; background:#fff; border:1px solid var(--line); border-radius:var(--radius); overflow:hidden }
  .doc-table th { background:#fafbfc; font-size:10px; text-transform:uppercase; letter-spacing:.04em; color:var(--ink-soft); padding:9px 14px; text-align:left; border-bottom:1px solid var(--line) }
  .doc-table td { padding:8px 14px; border-bottom:1px solid var(--line); vertical-align:middle }
  .doc-table tr:last-child td { border-bottom:0 }
  .doc-table tr:hover td { background:#fafbfc }
  .file-name { font-weight:500 }
  .file-id   { font-family:var(--mono); font-size:10px; color:var(--ink-soft) }
  .file-date { font-family:var(--mono); font-size:11px; white-space:nowrap }
  .tt { display:inline-block; font-size:11px; font-weight:600; padding:2px 9px; border-radius:20px; white-space:nowrap }
  .tt-all { background:#e7f0ff; color:#1558c0 }
  .tt-contacts { background:var(--ok-bg); color:var(--ok) }
  .tt-ie { background:#fff3e0; color:#9a5b00 }
  .tt-iefle { background:#f3e8ff; color:#7322b8 }
  .tt-inv { background:#e9f6f1; color:#0f7a52 }
  .tt-other { background:var(--line); color:var(--ink-soft) }
  .copy-btn { background:none; border:1px solid var(--line); border-radius:4px; padding:1px 6px; font-size:10px; font-weight:500; color:var(--ink-soft); cursor:pointer; margin-left:6px; vertical-align:middle }
  .copy-btn:hover { background:var(--bg) }
  .copy-btn.copied { color:var(--ok); border-color:var(--ok) }
  button { font-family:var(--sans); font-size:14px; font-weight:600; border:0; border-radius:7px; padding:10px 18px; cursor:pointer }
  .btn-ghost { background:#fff; border:1px solid var(--line); color:var(--ink); font-weight:500 }
  .btn-ghost:hover { background:var(--bg) }
  .load-more { display:block; margin:12px auto 0 }
  .empty { padding:18px 0; color:var(--ink-soft); font-style:italic }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Portal Documents Report Viewer</h1>
    <p>Visualize a documents report (the raw list-portal-documents API response) and filter it by sharing target type.</p>
  </header>
  <div class="nav"><a href="/">← Back to report tool</a></div>

  <div class="panel">
    <label class="drop" id="drop">
      <div class="dz-title" id="dzTitle">Upload Document report…</div>
      <div class="dz-sub" id="dzSub">Click or drop a documents-report JSON file (an array of portal documents).</div>
      <input type="file" id="uploadDocs" accept="application/json,.json">
    </label>
    <div class="warn-banner" id="warnBanner" hidden></div>
    <div class="status" id="status"></div>
  </div>

  <div id="results" hidden>
    <div class="section-title">By target type</div>
    <div class="summary" id="summary"></div>

    <div class="toolbar">
      <input type="text" id="search" placeholder="Search by document name or ID…">
      <select id="filterTarget"><option value="all">All target types</option></select>
      <span class="muted" id="resultCount"></span>
    </div>

    <table class="doc-table" id="docTable" hidden>
      <thead><tr>
        <th>File Name</th><th>Target Type</th><th>Shared At</th><th>Effective Date</th><th>Last Modified</th><th>Document ID</th>
      </tr></thead>
      <tbody id="docRows"></tbody>
    </table>
    <div class="empty" id="emptyMsg" hidden>No documents match the current filter.</div>
    <button class="btn-ghost load-more" id="loadMore" hidden>Show more</button>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
const esc = s => String(s==null?"":s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
function setStatus(msg, err=false){ const s=$("status"); s.textContent=msg; s.className="status"+(err?" err":""); }
function fmtDate(iso){ if(!iso) return "—"; try{ const d=new Date(iso); return isNaN(d)?iso:d.toLocaleDateString(undefined,{year:"numeric",month:"short",day:"numeric"}); }catch{ return iso; } }

async function copyText(text){
  try { if(navigator.clipboard && window.isSecureContext){ await navigator.clipboard.writeText(text); return true; } } catch {}
  try { const ta=document.createElement("textarea"); ta.value=text; ta.style.position="fixed"; ta.style.top="-1000px"; document.body.appendChild(ta); ta.focus(); ta.select(); const ok=document.execCommand("copy"); document.body.removeChild(ta); return ok; } catch { return false; }
}
async function copyFromBtn(btn){
  const ok=await copyText(btn.getAttribute("data-copy")||""); const o=btn.textContent;
  btn.textContent=ok?"copied!":"failed"; btn.classList.toggle("copied",ok);
  setTimeout(()=>{btn.textContent=o; btn.classList.remove("copied");},1200);
}

const TARGET_LABELS = {
  AllContacts:{text:"All contacts",cls:"tt-all"},
  Contacts:{text:"Contacts",cls:"tt-contacts"},
  InvestmentEntities:{text:"Entities",cls:"tt-ie"},
  InvestmentEntitiesInFundLegalEntity:{text:"Entity × fund",cls:"tt-iefle"},
  Investments:{text:"Investments",cls:"tt-inv"},
};
function targetTypeOf(d){ return (d.sharedWith && d.sharedWith.targetType) || "Other"; }
function targetTypeLabel(t){ if(!t) return '<span style="color:var(--absent)">—</span>'; const m=TARGET_LABELS[t]||{text:t,cls:"tt-other"}; return `<span class="tt ${m.cls}" title="${esc(t)}">${esc(m.text)}</span>`; }

const DOCS_HANDOFF_KEY = "documentsReportHandoff";
const DOCS_HANDOFF_NOTE_KEY = "documentsReportHandoffNote";
const PAGE = 100;
let allDocs = [];
let filteredDocs = [];
let shown = 0;

function loadDocs(docs, sourceLabel){
  allDocs = docs;
  $("dzTitle").textContent = `Loaded ${docs.length} document${docs.length===1?"":"s"}`;
  $("dzSub").textContent = sourceLabel ? `Source: ${sourceLabel}. Click to load a different file.` : "Click to load a different file.";
  $("drop").classList.add("loaded");
  setStatus("");
  buildSummaryAndFilter();
  $("results").hidden = false;
  applyFilter();
}

function buildSummaryAndFilter(){
  const counts = {};
  for(const d of allDocs){ const t=targetTypeOf(d); counts[t]=(counts[t]||0)+1; }
  const order = ["Contacts","InvestmentEntitiesInFundLegalEntity","Investments","InvestmentEntities","AllContacts"];
  const present = order.filter(t=>counts[t]).concat(Object.keys(counts).filter(t=>!order.includes(t)).sort());

  // Summary chips (the first "All" chip clears the filter)
  const chips = [`<div class="chip chip-filter active" data-t="all"><b>${allDocs.length}</b><span>All documents</span></div>`];
  for(const t of present){
    const m = TARGET_LABELS[t] || {text:t};
    chips.push(`<div class="chip chip-filter" data-t="${esc(t)}"><b>${counts[t]}</b><span>${esc(m.text)}</span></div>`);
  }
  $("summary").innerHTML = chips.join("");
  $("summary").querySelectorAll(".chip-filter").forEach(c=>c.onclick=()=>{ $("filterTarget").value=c.getAttribute("data-t"); applyFilter(); });

  // Dropdown
  const opts = [`<option value="all">All target types (${allDocs.length})</option>`];
  for(const t of present){ const m=TARGET_LABELS[t]||{text:t}; opts.push(`<option value="${esc(t)}">${esc(m.text)} (${counts[t]})</option>`); }
  $("filterTarget").innerHTML = opts.join("");
}

function applyFilter(){
  const search = $("search").value.trim().toLowerCase();
  const target = $("filterTarget").value;
  let rows = allDocs;
  if(target!=="all") rows = rows.filter(d=>targetTypeOf(d)===target);
  if(search) rows = rows.filter(d=>(d.name||"").toLowerCase().includes(search) || (d.id||"").toLowerCase().includes(search));
  filteredDocs = rows; shown = 0; $("docRows").innerHTML="";

  // keep chip highlight in sync
  $("summary").querySelectorAll(".chip-filter").forEach(c=>c.classList.toggle("active", c.getAttribute("data-t")===target));
  $("resultCount").textContent = `${rows.length} document${rows.length===1?"":"s"}`;

  const has = rows.length>0;
  $("docTable").hidden = !has;
  $("emptyMsg").hidden = has;
  if(has) renderMore(); else $("loadMore").hidden = true;
}

function rowHtml(d){
  return `<tr>
    <td class="file-name">${esc(d.name||"—")}</td>
    <td>${targetTypeLabel(targetTypeOf(d))}</td>
    <td class="file-date">${fmtDate(d.sharedAt)}</td>
    <td class="file-date">${esc(d.effectiveDate||"—")}</td>
    <td class="file-date">${fmtDate(d.lastModifiedAt)}</td>
    <td class="file-id">${esc(d.id||"—")}<button class="copy-btn" data-copy="${esc(d.id||"")}" onclick="copyFromBtn(this)">copy</button></td>
  </tr>`;
}
function renderMore(){
  const slice = filteredDocs.slice(shown, shown+PAGE);
  const frag = document.createElement("tbody");
  frag.innerHTML = slice.map(rowHtml).join("");
  while(frag.firstChild) $("docRows").appendChild(frag.firstChild);
  shown += slice.length;
  const remaining = filteredDocs.length - shown;
  $("loadMore").hidden = remaining<=0;
  $("loadMore").textContent = `Show more (${remaining} remaining)`;
}

function parseDocsPayload(text, sourceLabel){
  let data;
  try { data = JSON.parse(text); }
  catch { setStatus("Could not parse JSON.", true); return; }
  // Accept a bare array, or an object wrapping the array (rawPortalDocuments / documents / data).
  const docs = Array.isArray(data) ? data
    : Array.isArray(data?.rawPortalDocuments) ? data.rawPortalDocuments
    : Array.isArray(data?.documents) ? data.documents
    : Array.isArray(data?.data) ? data.data : null;
  if(!docs){ setStatus("This file is not a documents report (expected an array of portal documents).", true); return; }
  loadDocs(docs, sourceLabel);
}

function loadFromFile(file){
  const reader = new FileReader();
  reader.onload = () => parseDocsPayload(reader.result, file.name);
  reader.onerror = () => setStatus(`Could not read ${file.name}.`, true);
  reader.readAsText(file);
}

/* events */
$("uploadDocs").onchange = e => { const f=e.target.files[0]; if(f) loadFromFile(f); e.target.value=""; };
const drop = $("drop");
["dragenter","dragover"].forEach(ev=>drop.addEventListener(ev, e=>{ e.preventDefault(); drop.classList.add("drag"); }));
["dragleave","drop"].forEach(ev=>drop.addEventListener(ev, e=>{ e.preventDefault(); drop.classList.remove("drag"); }));
drop.addEventListener("drop", e=>{ const f=e.dataTransfer?.files?.[0]; if(f) loadFromFile(f); });
$("search").oninput = applyFilter;
$("filterTarget").onchange = applyFilter;
$("loadMore").onclick = renderMore;

/* hand-off from the main tool: load the current report's raw docs when small enough,
   otherwise show the "too large to auto-load" warning the main tool left behind. */
(function(){
  try {
    const raw = localStorage.getItem(DOCS_HANDOFF_KEY);
    if(raw){
      localStorage.removeItem(DOCS_HANDOFF_KEY);
      localStorage.removeItem(DOCS_HANDOFF_NOTE_KEY);
      parseDocsPayload(raw, "current report");
      return;
    }
    const noteRaw = localStorage.getItem(DOCS_HANDOFF_NOTE_KEY);
    if(noteRaw){
      localStorage.removeItem(DOCS_HANDOFF_NOTE_KEY);
      const n = JSON.parse(noteRaw);
      const wb = $("warnBanner");
      wb.innerHTML = `The current report has <b>${(n.count||0).toLocaleString()}</b> document${n.count===1?"":"s"}`
        + (n.mb ? ` (~${n.mb} MB)` : "")
        + ` — too large to open automatically (limit: ${(n.maxDocs||0).toLocaleString()} documents / ${n.maxMb} MB).`
        + ` In the report tool, click <b>Download documents report</b>, then upload the file above.`;
      wb.hidden = false;
    }
  } catch {}
})();
</script>
</body>
</html>
